name: CI

on:
    push:
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            -   uses: actions/checkout@v4

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4
                with:
                    dotnet-version: '10.0.x'

            -   name: Restore dependencies
                run: dotnet restore

            -   name: Build
                run: dotnet build --no-restore

            -   name: Run tests
                run: dotnet test tests/Plutus.Core.UnitTests/ --no-build -v quiet
